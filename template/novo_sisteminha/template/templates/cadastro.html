<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIAD - Cadastro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css_cadastro.css') }}">
</head>
<body>

    <div class="header-bg">
        <p>Instituto Federal de Mato Grosso do Sul</p>
        <h1>Novo Cadastro</h1>
    </div>

    <div class="login-card">
        <h2>Crie sua conta</h2>
        <span>Preencha os dados abaixo</span>

        {% if erro %}
            <div class="error-msg">{{ erro }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('cadastro') }}">
            <div class="form-group">
                <input type="text" name="usuario" placeholder="Escolha um utilizador" required>
            </div>
            <div class="form-group">
                <input type="password" name="senha" placeholder="Escolha uma senha" required>
            </div>
            <button type="submit" class="btn-submit">Finalizar Cadastro</button>
        </form>

        <div class="signup-link">
            Já tem uma conta? <a href="{{ url_for('login') }}">Faça Login</a>
        </div>
    </div>

</body>
</html>
